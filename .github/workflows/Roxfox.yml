name: Build ITz L3 Launcher APK

on:
  workflow_dispatch:

jobs:
  BuildDebug:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm", "arm64", "x86", "x86_64" ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Debug ${{ matrix.arch }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug -Darch=${{ matrix.arch }} || ./gradlew assembleDebug -Darch=${{ matrix.arch }}

      - name: Upload Debug ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: ITz-L3-Launcher-${{ matrix.arch }}
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/*/*.apk
            
